# AI Code Review Workflow
# Uses centralized reusable workflow from Sosoka-Labs/.github
# Requires: OPENAI_API_KEY repository secret

name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    uses: Sosoka-Labs/.github/.github/workflows/ai-code-review.yml@main
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
